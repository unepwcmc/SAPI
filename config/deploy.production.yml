# Name of the container image
image: unepwcmc/sapi/rails-production

servers:
  web:
    hosts:
      - 172.20.0.158 # sapi-web-prod-01.internal.unep-wcmc.org
    options:
      add-host: host.docker.internal:host-gateway # Required to reach host-bound Redis
    proxy:
      response_timeout: 120 # kamal-proxy timeout config, default 30, cloudflare max 120.
      hosts:
        - sapi-web-prod-01.internal.unep-wcmc.org
        # Internal-only for now — public cutover to www.speciesplus.net AND trade.cites.org is a separate, later step
      ssl:
        certificate_pem: CERTIFICATE_PEM
        private_key_pem: PRIVATE_KEY_PEM
      forward_headers: true # Forward headers like X-Forwarded-Proto
      logging:
        request_headers:
          - Cache-Control
          - User-Agent
          - X-Forwarded-Proto
        response_headers:
          - X-Request-ID
  job:
    hosts:
      - 172.20.0.158 # sapi-web-prod-01.internal.unep-wcmc.org
    env:
      clear:
        # Sidekiq has ten job threads, so its database pool must override the
        # five-connection web default. Remove this if Sidekiq returns to five.
        SAPI_RAILS_MAX_THREADS: 10
    options:
      add-host: host.docker.internal:host-gateway # Required to reach host-bound Redis
      # Docker-native healthcheck (non-proxy role). Explicit fast interval/start-period
      # so the container reports healthy well within Kamal's readiness window — Docker's
      # default 30s interval means the first check wouldn't fire in time otherwise.
      # https://docs.docker.com/engine/containers/run/#healthchecks
      health-cmd: /rails/bin/docker-sidekiq-healthcheck
      health-interval: 5s
      health-retries: 3
      health-start-period: 5s
      health-timeout: 3s
    cmd: bundle exec sidekiq -C config/sidekiq.yml

# Build remotely on the production web server (not the staging server the base
# config points at), using the production-specific Docker target that starts puma.
builder:
  dockerfile: Dockerfile
  target: exec-production
  remote: ssh://wcmc@172.20.0.158

# Environment variables
env:
  clear:
    RAILS_ENV: production
    # Six workers give the checklist's bursty API traffic most of the shared
    # VM's capacity while leaving room for the other apps and Sidekiq. Revisit
    # after production load testing or when adding another host.
    WEB_CONCURRENCY: 6
    RAILS_MAX_THREADS: 5 # Puma threads per worker; database pools are configured separately below.
    # Keep each web database pool aligned with Puma's five request threads.
    # The job role overrides this because Sidekiq has different concurrency.
    SAPI_RAILS_MAX_THREADS: 5
